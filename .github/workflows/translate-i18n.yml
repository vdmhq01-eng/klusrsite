name: Translate UI (i18n)

# Vertaalt elke nacht nieuwe/gewijzigde UI-teksten naar de overlay-talen (Pools)
# met Claude, en commit de overlays. Ook handmatig te starten via "Run workflow".
on:
  schedule:
    - cron: "0 2 * * *" # elke nacht 02:00 UTC
  # Ook bij elke push naar main: nieuwe/gewijzigde UI-teksten worden dan meteen
  # (incrementeel) vertaald. De eerste run vult ook de nog lege Pools-overlay.
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      locales:
        description: "Overlay-talen (komma-gescheiden)"
        required: false
        default: "pl"

permissions:
  contents: write

concurrency:
  group: translate-i18n
  cancel-in-progress: false

jobs:
  translate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Vertaal UI-teksten
        run: npx tsx scripts/translate-ui.ts
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          I18N_UI_LOCALES: ${{ github.event.inputs.locales || 'pl' }}
      - name: Commit vertalingen
        run: |
          git config user.name "klusr-bot"
          git config user.email "bot@klus-r.nl"
          git add src/lib/i18n/messages.*.json
          if git diff --cached --quiet; then
            echo "Geen nieuwe vertalingen."
          else
            git commit -m "i18n: UI-vertalingen bijgewerkt (automatisch)"
            git push
          fi
